// ═══ TIMESHEET (Manager) ═══
function Timesheet({ conges }) {
  const [mode, setMode] = useState("week"); // week or month
  const [weekOffset, setWeekOffset] = useState(0);
  const [monthOffset, setMonthOffset] = useState(0);

  const today = new Date(2026, 2, 26);
  const todayStr = "2026-03-26";
  const emps = MOCK_DATA.employees;
  const pts = MOCK_DATA.pointages;

  const getHours = (a, d) => {
    if (!d) return 0;
    const [ah,am] = a.split(":").map(Number);
    const [dh,dm] = d.split(":").map(Number);
    return Math.max(0, (dh - ah) + (dm - am) / 60);
  };

  const isWeekend = (d) => d.getDay() === 0 || d.getDay() === 6;

  const getConge = (empId, dateStr) => {
    return conges.find(c => c.employeeId === empId && dateStr >= c.dateStart && dateStr <= c.dateEnd && (c.status === "Validé" || c.status === "En attente"));
  };

  // Week mode
  const getWeekDays = () => {
    const mon = new Date(2026, 2, 23 + weekOffset * 7);
    return Array.from({length: 7}, (_, i) => {
      const d = new Date(mon);
      d.setDate(d.getDate() + i);
      return d;
    });
  };

  // Month mode
  const getMonthDays = () => {
    const m = new Date(2026, 2 + monthOffset, 1);
    const daysInMonth = new Date(m.getFullYear(), m.getMonth() + 1, 0).getDate();
    return Array.from({length: daysInMonth}, (_, i) => new Date(m.getFullYear(), m.getMonth(), i + 1));
  };

  const days = mode === "week" ? getWeekDays() : getMonthDays();
  const JOURS = ["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
  const MOIS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

  const navLabel = mode === "week"
    ? `Sem. ${Math.ceil((days[0].getDate() + new Date(days[0].getFullYear(), days[0].getMonth(), 1).getDay()) / 7)} — ${MOIS[days[0].getMonth()]} ${days[0].getFullYear()}`
    : `${MOIS[days[0].getMonth()]} ${days[0].getFullYear()}`;

  const prev = () => mode === "week" ? setWeekOffset(w => w - 1) : setMonthOffset(m => m - 1);
  const next = () => mode === "week" ? setWeekOffset(w => w + 1) : setMonthOffset(m => m + 1);
  const goToday = () => { setWeekOffset(0); setMonthOffset(0); };

  // Compute all data
  const rows = emps.map(emp => {
    let totalH = 0;
    let absenceDays = 0;
    const cells = days.map(day => {
      const dStr = ds(day);
      const we = isWeekend(day);
      const cg = getConge(emp.id, dStr);
      const pt = pts.find(p => p.employeeId === emp.id && p.date === dStr && p.departure);
      const ptLive = pts.find(p => p.employeeId === emp.id && p.date === dStr && !p.departure);
      const h = pt ? getHours(pt.arrival, pt.departure) : 0;
      if (h > 0) totalH += h;
      if (cg) absenceDays++;
      return { day, dStr, we, cg, h, ptLive, isToday: dStr === todayStr };
    });
    return { emp, cells, totalH, absenceDays };
  });

  // Totals row
  const dayTotals = days.map((day, i) => {
    return rows.reduce((sum, r) => sum + r.cells[i].h, 0);
  });
  const grandTotal = rows.reduce((s, r) => s + r.totalH, 0);

  return (
    <>
      <h2 style={{fontSize:20,fontWeight:700,marginBottom:4}}>Feuille de temps</h2>
      <p style={{fontSize:13,color:"var(--ts)",marginBottom:14}}>Suivi des heures par salarié</p>

      {/* Mode toggle */}
      <div className="ts-mode">
        <button className={`ts-mode-btn ${mode==="week"?"active":""}`} onClick={()=>setMode("week")}>Semaine</button>
        <button className={`ts-mode-btn ${mode==="month"?"active":""}`} onClick={()=>setMode("month")}>Mois</button>
      </div>

      {/* Navigation */}
      <div className="ts-nav">
        <div className="ts-nav-btns">
          <button className="ts-nav-btn" onClick={prev}>{I.chevL}</button>
          <button className="ts-nav-btn" onClick={goToday} style={{fontSize:11,fontWeight:600,width:"auto",padding:"0 10px"}}>Auj.</button>
          <button className="ts-nav-btn" onClick={next}>{I.chevR}</button>
        </div>
        <div className="ts-nav-label">{navLabel}</div>
      </div>

      {/* Summary cards */}
      <div className="ts-summary">
        <div className="ts-summary-card">
          <div className="ts-summary-val" style={{color:"var(--ac)"}}>{grandTotal.toFixed(0)}<span style={{fontSize:12,opacity:.6}}>h</span></div>
          <div className="ts-summary-label">Total heures</div>
        </div>
        <div className="ts-summary-card">
          <div className="ts-summary-val" style={{color:"var(--wa)"}}>{rows.reduce((s,r)=>s+r.absenceDays,0)}</div>
          <div className="ts-summary-label">Jours d'absence</div>
        </div>
      </div>

      {/* Legend */}
      <div className="ts-legend">
        <div className="ts-legend-item"><div className="ts-legend-dot" style={{background:"var(--ac)"}} />Heures pointées</div>
        <div className="ts-legend-item"><div className="ts-legend-dot" style={{background:"var(--or)"}} />Congé</div>
        <div className="ts-legend-item"><div className="ts-legend-dot" style={{background:"var(--bg)",border:"1px solid var(--bl)"}} />Week-end</div>
      </div>

      {/* Table */}
      <div className="ts-scroll">
        <table className="ts-table">
          <thead>
            <tr>
              <th>Salarié</th>
              {days.map((d, i) => {
                const dStr = ds(d);
                const we = isWeekend(d);
                const isToday = dStr === todayStr;
                return (
                  <th key={i} className={`ts-cell ${isToday?"ts-th-today":""} ${we?"ts-th-we":""}`}>
                    <div>{JOURS[d.getDay()].charAt(0)}</div>
                    <div style={{fontSize:mode==="month"?8:10}}>{d.getDate()}</div>
                  </th>
                );
              })}
              <th style={{minWidth:44}}>Total</th>
            </tr>
          </thead>
          <tbody>
            {rows.map(({emp, cells, totalH}) => (
              <tr key={emp.id}>
                <td>
                  <div className="ts-emp-cell">
                    <div className="ea" style={{background:"#6366f1"}}>{emp.avatar}</div>
                    <div className="ts-emp-name">{emp.name.split(" ")[0]}</div>
                  </div>
                </td>
                {cells.map((c, i) => (
                  <td key={i} className={`ts-cell ${c.isToday?"today":""} ${c.we?"weekend":""} ${c.cg?"ts-conge":""}`}>
                    {c.cg ? (
                      <span>{c.cg.type}</span>
                    ) : c.we ? (
                      <span className="ts-empty">—</span>
                    ) : c.h > 0 ? (
                      <span className="ts-hours">{c.h.toFixed(1)}</span>
                    ) : c.ptLive ? (
                      <span style={{color:"var(--ok)",fontSize:10}}>●</span>
                    ) : c.dStr <= todayStr ? (
                      <span className="ts-absent">ABS</span>
                    ) : (
                      <span className="ts-empty">·</span>
                    )}
                  </td>
                ))}
                <td><span className="ts-total">{totalH.toFixed(1)}</span></td>
              </tr>
            ))}
            {/* Totals row */}
            <tr className="ts-total-row">
              <td>TOTAL</td>
              {dayTotals.map((t, i) => (
                <td key={i} className={`ts-cell ${days[i] && ds(days[i])===todayStr?"today":""}`}>
                  {t > 0 ? <span>{t.toFixed(0)}</span> : <span style={{opacity:.3}}>—</span>}
                </td>
              ))}
              <td><span style={{color:"var(--ac)",fontSize:13}}>{grandTotal.toFixed(0)}h</span></td>
            </tr>
          </tbody>
        </table>
      </div>

      {/* Per-employee detail cards */}
      <div className="sct">Détail par salarié</div>
      {rows.map(({emp, totalH, absenceDays, cells}) => {
        const workedDays = cells.filter(c => c.h > 0).length;
        const avgPerDay = workedDays > 0 ? totalH / workedDays : 0;
        return (
          <div className="cd" key={emp.id} style={{padding:14,marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div className="ea" style={{background:"#6366f1"}}>{emp.avatar}</div>
              <div style={{flex:1}}>
                <div className="en">{emp.name}</div>
                <div className="erl">{emp.role} — {emp.team}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"var(--fm)",fontSize:16,fontWeight:700,color:"var(--ac)"}}>{totalH.toFixed(1)}h</div>
                <div style={{fontSize:10,color:"var(--ts)"}}>{workedDays}j travaillés</div>
              </div>
            </div>
            <div style={{display:"flex",gap:12,marginTop:10,fontSize:12,color:"var(--ts)"}}>
              <span>Moy/jour : <strong style={{color:"var(--tp)"}}>{avgPerDay.toFixed(1)}h</strong></span>
              {absenceDays > 0 && <span style={{color:"var(--or)"}}>Absences : <strong>{absenceDays}j</strong></span>}
            </div>
          </div>
        );
      })}
    </>
  );
}

// ═══ MEETING ASSISTANT ═══
function MeetingAssistant({ chantiers }) {
  const [meetChantier, setMeetChantier] = useState(chantiers[0]?.id || "");
  const [meetTitle, setMeetTitle] = useState("");
  const [isRecording, setIsRecording] = useState(false);
  const [transcript, setTranscript] = useState([]);
  const [liveLine, setLiveLine] = useState("");
  const [timer, setTimer] = useState(0);
  const [synthesis, setSynthesis] = useState(null);
  const [isSynthesizing, setIsSynthesizing] = useState(false);
  const [pastMeetings, setPastMeetings] = useState([
    { id: 1, title: "Réunion avancement lot gros-œuvre", chantier: "Résidence Les Oliviers", date: "2026-03-24", duration: "18 min", synthesis: "**Points abordés :**\n• Avancement coffrage escalier B — retard d'1 jour rattrapable\n• Livraison parpaings confirmée pour le 25/03\n• Problème d'humidité sous-sol à surveiller\n\n**Décisions prises :**\n• Lucas vérifie l'étanchéité mercredi matin\n• Commander 2 palettes de mortier supplémentaires\n• Prochaine réunion vendredi 14h\n\n**Actions à mener :**\n1. Lucas — Vérifier coffrage escalier B avant coulage\n2. Sophie — Commander mortier chez Point P\n3. Thomas — Reprendre câblage étage 2 après séchage" },
    { id: 2, title: "Point sécurité hebdo", chantier: "Bureau Parc Technologique", date: "2026-03-20", duration: "12 min", synthesis: "**Sécurité :**\n• EPI conformes pour tous les intervenants\n• Signalétique zone de déchargement à renforcer\n• Extincteur étage 1 à remplacer\n\n**Actions :**\n1. Marc — Poser la nouvelle signalétique\n2. Julie — Commander extincteur" },
  ]);
  const [viewingPast, setViewingPast] = useState(null);
  const recognRef = useRef(null);
  const timerRef = useRef(null);

  // Start/stop recording
  const toggleRecording = () => {
    if (isRecording) {
      stopRecording();
    } else {
      startRecording();
    }
  };

  const startRecording = () => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      // Fallback: simulate transcript
      setIsRecording(true);
      setTimer(0);
      setTranscript([]);
      setSynthesis(null);
      timerRef.current = setInterval(() => setTimer(t => t + 1), 1000);
      // Simulate incoming speech
      const simLines = [
        "Bon, on fait le point sur l'avancement du chantier cette semaine.",
        "Lucas, où en est-on sur le coffrage de l'escalier B ?",
        "On a pris un jour de retard à cause de la pluie de mardi, mais c'est rattrapable.",
        "Il faut absolument que ce soit prêt pour le coulage de lundi.",
        "Thomas, les câbles RJ45 étage 2, c'est bouclé ?",
        "Presque, il me reste une gaine à tirer côté nord. Je finis demain matin.",
        "Sophie, on a reçu la livraison de parpaings ?",
        "Oui, tout est conforme au bon de commande. J'ai vérifié les quantités.",
        "Parfait. Point important : j'ai remarqué une fissure sur le mur porteur côté nord.",
        "Il faudrait qu'on fasse venir un expert pour vérifier ça rapidement.",
        "Je m'en occupe, je contacte le bureau d'études demain matin.",
        "Dernière chose, on a besoin de commander du mortier supplémentaire chez Point P.",
        "Ok, je gère la commande cet après-midi. On se revoit vendredi 14h.",
      ];
      let idx = 0;
      const simInterval = setInterval(() => {
        if (idx < simLines.length) {
          setTranscript(p => [...p, simLines[idx]]);
          idx++;
        }
        if (idx >= simLines.length) clearInterval(simInterval);
      }, 3000);
      recognRef.current = { simInterval };
      return;
    }

    const recog = new SpeechRecognition();
    recog.continuous = true;
    recog.interimResults = true;
    recog.lang = "fr-FR";

    recog.onresult = (e) => {
      let interim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          setTranscript(p => [...p, t.trim()]);
          setLiveLine("");
        } else {
          interim = t;
        }
      }
      if (interim) setLiveLine(interim);
    };

    recog.onerror = () => {};
    recog.start();
    recognRef.current = recog;
    setIsRecording(true);
    setTimer(0);
    setTranscript([]);
    setSynthesis(null);
    timerRef.current = setInterval(() => setTimer(t => t + 1), 1000);
  };

  const stopRecording = () => {
    setIsRecording(false);
    setLiveLine("");
    if (timerRef.current) clearInterval(timerRef.current);
    if (recognRef.current) {
      if (recognRef.current.simInterval) clearInterval(recognRef.current.simInterval);
      else if (recognRef.current.stop) recognRef.current.stop();
    }
  };

  // AI synthesis via Anthropic API
  const synthesize = async () => {
    if (transcript.length === 0) return;
    setIsSynthesizing(true);
    const fullTranscript = transcript.join("\n");
    const ch = chantiers.find(c => c.id === Number(meetChantier));

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: `Tu es un assistant de chantier BTP. Voici le transcript d'une réunion de chantier${ch ? ` pour le chantier "${ch.name}"` : ""}${meetTitle ? `, intitulée "${meetTitle}"` : ""}.

Fais une synthèse structurée avec :
1. **Points abordés** — résumé des sujets discutés
2. **Décisions prises** — ce qui a été acté
3. **Actions à mener** — liste numérotée avec le responsable et la tâche

Sois concis et opérationnel.

TRANSCRIPT :
${fullTranscript}`
          }]
        })
      });
      const data = await response.json();
      const text = data.content?.map(i => i.text || "").join("\n") || "Erreur lors de la synthèse.";
      setSynthesis(text);
      // Save to past meetings
      setPastMeetings(p => [{
        id: Date.now(),
        title: meetTitle || "Réunion de chantier",
        chantier: ch?.name || "—",
        date: "2026-03-26",
        duration: `${Math.floor(timer/60)} min`,
        synthesis: text,
      }, ...p]);
    } catch (err) {
      // Fallback synthesis
      setSynthesis(`**Points abordés :**\n• Avancement coffrage escalier B — retard d'1 jour\n• Câblage RJ45 étage 2 en cours de finalisation\n• Livraison parpaings reçue et conforme\n• Fissure détectée sur mur porteur côté nord\n• Besoin commande mortier supplémentaire\n\n**Décisions prises :**\n• Coffrage doit être prêt pour coulage lundi\n• Expert bureau d'études à contacter pour la fissure\n• Prochaine réunion vendredi 14h\n\n**Actions à mener :**\n1. Lucas — Finaliser coffrage escalier B\n2. Thomas — Terminer gaine câblage côté nord\n3. Sophie — Contacter bureau d'études pour fissure\n4. Manager — Commander mortier chez Point P`);
      setPastMeetings(p => [{
        id: Date.now(),
        title: meetTitle || "Réunion de chantier",
        chantier: ch?.name || "—",
        date: "2026-03-26",
        duration: `${Math.floor(timer/60)} min`,
        synthesis: synthesis,
      }, ...p]);
    }
    setIsSynthesizing(false);
  };

  const fmtTime = (s) => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  // Viewing a past meeting
  if (viewingPast) {
    return (
      <>
        <button className="chd-back" onClick={() => setViewingPast(null)}>{I.chevL} Retour</button>
        <div className="meet-synth">
          <div className="meet-synth-hd">{I.sparkle} {viewingPast.title}</div>
          <div style={{padding:"8px 16px",fontSize:12,color:"var(--ts)",borderBottom:"1px solid var(--bl)"}}>
            {viewingPast.chantier} · {viewingPast.date} · {viewingPast.duration}
          </div>
          <div className="meet-synth-body" style={{whiteSpace:"pre-wrap"}}>{viewingPast.synthesis}</div>
        </div>
      </>
    );
  }

  return (
    <>
      {/* Hero */}
      <div className="meet-hero">
        <h2>{I.sparkle} Assistant Réunion</h2>
        <p>Enregistrez, transcrivez, synthétisez</p>
      </div>

      {/* Config */}
      <div className="meet-config">
        <div className="fg" style={{marginBottom:10}}>
          <label className="fl">Chantier concerné</label>
          <select className="fs" value={meetChantier} onChange={e => setMeetChantier(e.target.value)}>
            <option value="">— Aucun (réunion générale) —</option>
            {chantiers.map(ch => <option key={ch.id} value={ch.id}>{ch.name}</option>)}
          </select>
        </div>
        <div className="fg" style={{marginBottom:0}}>
          <label className="fl">Titre de la réunion</label>
          <input className="fi" value={meetTitle} onChange={e => setMeetTitle(e.target.value)} placeholder="Ex: Point avancement semaine 13" />
        </div>
      </div>

      {/* Record button */}
      <div className="meet-rec-area">
        <button className={`meet-rec-btn ${isRecording ? "recording" : "idle"}`} onClick={toggleRecording}>
          {isRecording ? I.micOff : I.mic}
        </button>
        <div className="meet-rec-label">{isRecording ? "Enregistrement en cours..." : "Démarrer l'enregistrement"}</div>
        {isRecording && (
          <>
            <div className="meet-rec-timer">{fmtTime(timer)}</div>
            <div className="meet-wave">
              {[1,2,3,4,5,6,7].map(i => <div key={i} className="meet-wave-bar" />)}
            </div>
          </>
        )}
      </div>

      {/* Live transcript */}
      {transcript.length > 0 && (
        <div className="meet-transcript">
          <div className="meet-transcript-hd">
            <div className="meet-transcript-title">{I.fileText} Transcription {isRecording && <span className="bg bg-d" style={{fontSize:10}}>LIVE</span>}</div>
            <span style={{fontSize:11,color:"var(--ts)"}}>{transcript.length} phrase(s)</span>
          </div>
          <div className="meet-transcript-body">
            {transcript.map((line, i) => (
              <div className="meet-transcript-line" key={i}>{line}</div>
            ))}
            {liveLine && <div className="meet-transcript-live">{liveLine}...</div>}
          </div>
        </div>
      )}

      {/* Actions */}
      {transcript.length > 0 && !isRecording && (
        <div className="meet-actions">
          <button className="meet-action-btn primary" onClick={synthesize} disabled={isSynthesizing}>
            {I.sparkle} Synthétiser avec l'IA
          </button>
          <button className="meet-action-btn" onClick={() => { setTranscript([]); setSynthesis(null); setTimer(0); }}>
            {I.trash} Effacer
          </button>
        </div>
      )}

      {/* AI Synthesis loading */}
      {isSynthesizing && (
        <div className="meet-synth">
          <div className="meet-synth-hd">{I.sparkle} Synthèse IA</div>
          <div className="meet-synth-loading">
            <div className="dot" /><div className="dot" /><div className="dot" />
            Analyse en cours...
          </div>
        </div>
      )}

      {/* AI Synthesis result */}
      {synthesis && !isSynthesizing && (
        <div className="meet-synth">
          <div className="meet-synth-hd">{I.sparkle} Compte-rendu de réunion</div>
          <div className="meet-synth-body" style={{whiteSpace:"pre-wrap"}}>{synthesis}</div>
        </div>
      )}

      {/* Past meetings */}
      <div className="meet-past">
        <div className="sct">Réunions précédentes</div>
        {pastMeetings.map(m => (
          <div className="meet-past-item" key={m.id} onClick={() => setViewingPast(m)}>
            <div className="meet-past-icon">{I.fileText}</div>
            <div className="meet-past-info">
              <div className="meet-past-title">{m.title}</div>
              <div className="meet-past-meta">{m.chantier} · {m.date} · {m.duration}</div>
            </div>
            <div style={{color:"var(--ac)"}}>{I.chevR}</div>
          </div>
        ))}
      </div>
    </>
  );
}

// ═══ CHANTIER TAB (Manager) ═══
function ChantierTab({ chantiers, tasks, onNew }) {
  const [selectedId, setSelectedId] = useState(null);
  const [detailTab, setDetailTab] = useState("analytics");

  const ch = selectedId ? chantiers.find(c => c.id === selectedId) : null;

  const getHours = (arrival, departure) => {
    if (!departure) return 0;
    const [ah,am] = arrival.split(":").map(Number);
    const [dh,dm] = departure.split(":").map(Number);
    return (dh - ah) + (dm - am) / 60;
  };

  // List view
  if (!ch) {
    // Compute stats per chantier
    const chStats = chantiers.map(c => {
      const pts = MOCK_DATA.pointages.filter(p => p.chantierId === c.id && p.departure);
      const totalH = pts.reduce((s, p) => s + getHours(p.arrival, p.departure), 0);
      const uniqueEmps = [...new Set(pts.map(p => p.employeeId))];
      const uniqueDays = [...new Set(pts.map(p => p.date))];
      const chTasks = tasks.filter(t => t.chantierId === c.id);
      return { ...c, totalH, empCount: uniqueEmps.length, dayCount: uniqueDays.length, taskCount: chTasks.length, taskDone: chTasks.filter(t=>t.status==="completed").length };
    });

    return (
      <>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 style={{fontSize:20,fontWeight:700}}>Chantiers</h2>
          <button className="bt bt-p" style={{width:"auto",padding:"10px 18px",fontSize:13}} onClick={onNew}>{I.plus} Nouveau</button>
        </div>
        {chStats.map(c => (
          <div className="cc" key={c.id} onClick={() => setSelectedId(c.id)}>
            <div className="cch"><div className="ccd" style={{background:c.color}} /><div className="ccn">{c.name}</div></div>
            <div className="cca">{I.mapPin}{c.address}</div>
            <div style={{display:"flex",gap:12,paddingLeft:24,marginBottom:8}}>
              <div style={{fontSize:12,color:"var(--ts)",display:"flex",alignItems:"center",gap:4}}>
                {I.clock} <strong style={{color:"var(--tp)"}}>{c.totalH.toFixed(0)}h</strong> pointées
              </div>
              <div style={{fontSize:12,color:"var(--ts)",display:"flex",alignItems:"center",gap:4}}>
                {I.users} {c.empCount} salarié(s)
              </div>
            </div>
            <div className="ccf">
              <span style={{padding:"4px 10px",borderRadius:"var(--rf)",fontSize:11,fontWeight:600,background:c.status==="En cours"?"var(--ol)":"var(--al)",color:c.status==="En cours"?"var(--ok)":"var(--ac)"}}>{c.status}</span>
              {c.taskCount > 0 && <span style={{fontSize:11,color:"var(--ts)"}}>{I.taskSm} {c.taskDone}/{c.taskCount} tâches</span>}
              {c.teams.map(t=><span key={t} style={{fontSize:12,color:"var(--ts)",display:"flex",alignItems:"center",gap:4}}>{I.users} {t}</span>)}
            </div>
          </div>
        ))}
      </>
    );
  }

  // Detail view — analytics
  const pts = MOCK_DATA.pointages.filter(p => p.chantierId === ch.id && p.departure);
  const allPts = MOCK_DATA.pointages.filter(p => p.chantierId === ch.id);
  const totalH = pts.reduce((s, p) => s + getHours(p.arrival, p.departure), 0);
  const uniqueEmps = [...new Set(allPts.map(p => p.employeeId))];
  const uniqueDays = [...new Set(pts.map(p => p.date))].sort();
  const avgPerDay = uniqueDays.length > 0 ? totalH / uniqueDays.length : 0;
  const chTasks = tasks.filter(t => t.chantierId === ch.id);

  // Per employee breakdown
  const empBreakdown = uniqueEmps.map(eId => {
    const emp = MOCK_DATA.employees.find(e => e.id === eId);
    const empPts = pts.filter(p => p.employeeId === eId);
    const h = empPts.reduce((s, p) => s + getHours(p.arrival, p.departure), 0);
    const days = [...new Set(empPts.map(p => p.date))].length;
    const avgArr = empPts.length > 0 ? empPts.reduce((s,p) => { const [hh,mm]=p.arrival.split(":").map(Number); return s+hh*60+mm; },0) / empPts.length : 0;
    return { emp, hours: h, days, avgArrival: avgArr, pctOfTotal: totalH > 0 ? (h / totalH) * 100 : 0 };
  }).sort((a,b) => b.hours - a.hours);

  // Daily breakdown for chart (last 7 working days)
  const dailyData = uniqueDays.slice(-7).map(date => {
    const dayPts = pts.filter(p => p.date === date);
    const h = dayPts.reduce((s,p) => s + getHours(p.arrival, p.departure), 0);
    const d = new Date(date);
    return { date, label: d.toLocaleDateString("fr-FR",{weekday:"short",day:"numeric"}), hours: h, count: dayPts.length };
  });
  const maxDailyH = Math.max(...dailyData.map(d => d.hours), 1);

  // Timeline (recent days with who was present)
  const timelineData = uniqueDays.slice(-7).reverse().map(date => {
    const dayPts = allPts.filter(p => p.date === date);
    const h = pts.filter(p => p.date === date).reduce((s,p) => s + getHours(p.arrival, p.departure), 0);
    return { date, emps: dayPts.map(p => p.employeeId), hours: h };
  });

  return (
    <>
      <button className="chd-back" onClick={() => setSelectedId(null)}>{I.chevL} Tous les chantiers</button>

      {/* Hero */}
      <div className="chd-hero" style={{background:`linear-gradient(135deg, ${ch.color}, ${ch.color}dd)`}}>
        <div className="chd-hero-name">{ch.name}</div>
        <div className="chd-hero-addr">{I.mapPin} {ch.address}</div>
      </div>

      {/* KPIs */}
      <div className="chd-kpis">
        <div className="chd-kpi">
          <div className="chd-kpi-val" style={{color:ch.color}}>{totalH.toFixed(0)}<span className="chd-kpi-unit">h</span></div>
          <div className="chd-kpi-label">Total pointé</div>
        </div>
        <div className="chd-kpi">
          <div className="chd-kpi-val" style={{color:"var(--wa)"}}>{avgPerDay.toFixed(1)}<span className="chd-kpi-unit">h</span></div>
          <div className="chd-kpi-label">Moy / jour</div>
        </div>
        <div className="chd-kpi">
          <div className="chd-kpi-val" style={{color:"var(--ok)"}}>{uniqueEmps.length}</div>
          <div className="chd-kpi-label">Intervenants</div>
        </div>
      </div>

      {/* Detail tabs */}
      <div className="tb" style={{marginBottom:14}}>
        <button className={`ti ${detailTab==="analytics"?"a":""}`} onClick={()=>setDetailTab("analytics")}>Temps</button>
        <button className={`ti ${detailTab==="equipe"?"a":""}`} onClick={()=>setDetailTab("equipe")}>Équipe</button>
        <button className={`ti ${detailTab==="historique"?"a":""}`} onClick={()=>setDetailTab("historique")}>Historique</button>
      </div>

      {detailTab === "analytics" && <>
        {/* Daily hours bar chart */}
        <div className="chd-chart">
          <div className="chd-chart-title">Heures pointées par jour</div>
          <div className="chd-bars">
            {dailyData.map((d,i) => (
              <div className="chd-bar-col" key={i}>
                <div className="chd-bar-wrap">
                  <div className="chd-bar-val">{d.hours.toFixed(0)}h</div>
                  <div className="chd-bar" style={{height:`${(d.hours/maxDailyH)*100}%`,background:ch.color,opacity: d.date === "2026-03-26" ? 1 : 0.6}} />
                </div>
                <div className="chd-bar-label" style={{fontWeight: d.date==="2026-03-26"?700:400, color: d.date==="2026-03-26"?"var(--ac)":"var(--tt)"}}>{d.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Summary stats */}
        <div className="cd" style={{padding:14}}>
          <div className="ch"><span className="ct">Résumé</span></div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
              <span style={{color:"var(--ts)"}}>Jours travaillés</span>
              <strong>{uniqueDays.length} jours</strong>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
              <span style={{color:"var(--ts)"}}>Heures totales</span>

// ═══ MANAGER TASK TRACKER ═══
function MgrTaskTracker({ tasks, chantiers }) {
  const [statusFilter, setStatusFilter] = useState("all");
  const [groupBy, setGroupBy] = useState("chantier");
  const [expandedTask, setExpandedTask] = useState(null);

  const today = "2026-03-26";
  const pending = tasks.filter(t => t.status === "new");
  const inProgress = tasks.filter(t => t.status === "accepted");
  const completed = tasks.filter(t => t.status === "completed");
  const overdue = tasks.filter(t => t.status !== "completed" && t.deadline && t.deadline < today);

  const filtered = statusFilter === "all" ? tasks
    : statusFilter === "pending" ? pending
    : statusFilter === "progress" ? inProgress
    : statusFilter === "done" ? completed
    : statusFilter === "overdue" ? overdue
    : tasks;

  // Group
  const grouped = useMemo(() => {
    const groups = {};
    filtered.forEach(t => {
      let key, label, color, sortKey;
      if (groupBy === "chantier") {
        const ch = chantiers.find(c => c.id === t.chantierId);
        key = t.chantierId || "none";
        label = ch?.name || "Sans chantier";
        color = ch?.color || "#94a3b8";
        sortKey = label;
      } else if (groupBy === "collaborateur") {
        const emp = MOCK_DATA.employees.find(e => e.id === t.assigneeId);
        key = t.assigneeId;
        label = emp?.name || "Inconnu";
        color = "#6366f1";
        sortKey = label;
      } else {
        key = t.date;
        label = new Date(t.date).toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long" });
        color = "#2563eb";
        sortKey = t.date;
      }
      if (!groups[key]) groups[key] = { label, color, sortKey, tasks: [] };
      groups[key].tasks.push(t);
    });
    return Object.values(groups).sort((a, b) => {
      if (groupBy === "date") return b.sortKey.localeCompare(a.sortKey);
      return a.sortKey.localeCompare(b.sortKey);
    });
  }, [filtered, groupBy, chantiers]);

  const getDeadlineInfo = (d) => {
    if (!d) return { cls: "ok", label: "—" };
    if (d < today) return { cls: "urgent", label: "En retard" };
    if (d === today) return { cls: "urgent", label: "Aujourd'hui" };
    const diff = Math.ceil((new Date(d) - new Date(today)) / 86400000);
    if (diff <= 2) return { cls: "soon", label: `J-${diff}` };
    return { cls: "ok", label: new Date(d).toLocaleDateString("fr-FR", { day: "numeric", month: "short" }) };
  };

  const respLabel = (t) => {
    if (!t.response) return null;
    if (t.response === "oui") return { text: "Oui", cls: "oui" };
    if (t.response === "non") return { text: "Non", cls: "non" };
    if (t.response === "done") return { text: "Fait", cls: "oui" };
    if (t.response === "notdone") return { text: "Pas encore", cls: "non" };
    if (t.response === "photo_sent") return { text: "Photo reçue", cls: "photo" };
    return { text: t.response.length > 25 ? t.response.slice(0, 25) + "…" : t.response, cls: "msg" };
  };

  const statusPill = (s) => {
    if (s === "new") return <div className="task-status-pill new">En attente</div>;
    if (s === "accepted") return <div className="task-status-pill accepted">En cours</div>;
    return <div className="task-status-pill completed">{I.checkCircle} Terminé</div>;
  };

  return (
    <>
      <h2 style={{fontSize:20,fontWeight:700,marginBottom:4}}>Suivi des tâches</h2>
      <p style={{fontSize:13,color:"var(--ts)",marginBottom:14}}>{tasks.length} tâche(s) au total</p>

      {/* Stats */}
      <div className="mtt-stats">
        {[
          { id: "all", label: "Toutes", count: tasks.length, color: "var(--tp)" },
          { id: "pending", label: "En attente", count: pending.length, color: "var(--ac)" },
          { id: "progress", label: "En cours", count: inProgress.length, color: "var(--wa)" },
          { id: "done", label: "Terminées", count: completed.length, color: "var(--ok)" },
        ].map(s => (
          <div key={s.id} className={`mtt-stat ${statusFilter === s.id ? "active" : ""}`} onClick={() => setStatusFilter(s.id)}>
            <div className="mtt-sv" style={{color: s.color}}>{s.count}</div>
            <div className="mtt-sl">{s.label}</div>
          </div>
        ))}
      </div>

      {overdue.length > 0 && statusFilter !== "done" && (
        <div className="task-overdue-banner" style={{cursor:"pointer"}} onClick={() => setStatusFilter("overdue")}>
          {I.alert} {overdue.length} tâche(s) en retard
        </div>
      )}

      {/* Group by selector */}
      <div className="mtt-sort-bar">
        {[
          { id: "chantier", label: "Par chantier" },
          { id: "collaborateur", label: "Par collaborateur" },
          { id: "date", label: "Par date" },
        ].map(g => (
          <button key={g.id} className={`mtt-sort-btn ${groupBy === g.id ? "active" : ""}`} onClick={() => setGroupBy(g.id)}>
            {g.label}
          </button>
        ))}
      </div>

      {/* Task groups */}
      {filtered.length === 0 && (
        <div className="mtt-empty">{I.task}<p style={{marginTop:8,fontSize:14}}>Aucune tâche dans cette catégorie</p></div>
      )}

      {grouped.map((group, gi) => (
        <div key={gi} style={{marginBottom:16}}>
          <div className="mtt-group-hd">
            {groupBy === "chantier" && <div className="ccd" style={{background:group.color}} />}
            {groupBy === "collaborateur" && <div className="ea" style={{background:group.color,width:22,height:22,fontSize:8,borderRadius:6}}>
              {group.label.split(" ").map(w=>w[0]).join("")}
            </div>}
            {groupBy === "date" && <span style={{color:"var(--ac)"}}>{I.calendar}</span>}
            <span>{group.label}</span>
            <span style={{fontSize:11,color:"var(--tt)",fontWeight:400}}>{group.tasks.length}</span>
          </div>

          {group.tasks.map(t => {
            const emp = MOCK_DATA.employees.find(e => e.id === t.assigneeId);
            const ch = chantiers.find(c => c.id === t.chantierId);
            const dl = getDeadlineInfo(t.deadline);
            const resp = respLabel(t);
            const isExpanded = expandedTask === t.id;
            const isOverdue = t.status !== "completed" && t.deadline && t.deadline < today;

            return (
              <div key={t.id}>
                <div className={`mtt-task-row ${isOverdue ? "overdue" : ""}`} onClick={() => setExpandedTask(isExpanded ? null : t.id)}>
                  <div className={`mtt-task-pri ${t.priority}`} />
                  <div className="mtt-task-info">
                    <div className="mtt-task-title">{t.title}</div>
                    <div className="mtt-task-sub">
                      {groupBy !== "collaborateur" && <span>{I.user} {emp?.name}</span>}
                      {groupBy !== "chantier" && ch && <span>{I.building} {ch.name.split(" ").slice(0,2).join(" ")}</span>}
                      {groupBy !== "date" && <span>{I.calendar} {t.date}</span>}
                      <span className={`task-deadline ${dl.cls}`} style={{padding:"2px 6px",fontSize:10}}>{dl.label}</span>
                    </div>
                    {resp && (
                      <div className={`mtt-resp-preview ${resp.cls}`}>
                        {resp.cls === "oui" && I.checkCircle}
                        {resp.cls === "non" && I.x}
                        {resp.cls === "photo" && I.camera}
                        {resp.cls === "msg" && I.send}
                        {resp.text}
                      </div>
                    )}
                  </div>
                  <div className="mtt-task-status">{statusPill(t.status)}</div>
                </div>

                {isExpanded && (
                  <div className="mtt-detail">
                    <div className="mtt-detail-row">
                      <span className="mtt-detail-label">Assigné à</span>
                      <span className="mtt-detail-val">{emp?.name}</span>
                    </div>
                    {ch && <div className="mtt-detail-row">
                      <span className="mtt-detail-label">Chantier</span>
                      <span className="mtt-detail-val">{ch.name}</span>
                    </div>}
                    <div className="mtt-detail-row">
                      <span className="mtt-detail-label">Date</span>
                      <span className="mtt-detail-val">{new Date(t.date).toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"})}</span>
                    </div>
                    <div className="mtt-detail-row">
                      <span className="mtt-detail-label">Échéance</span>
                      <span className={`mtt-detail-val`} style={{color: dl.cls==="urgent"?"var(--da)":dl.cls==="soon"?"var(--wa)":"var(--ts)"}}>{t.deadline ? new Date(t.deadline).toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}) : "Aucune"}</span>
                    </div>
                    <div className="mtt-detail-row">
                      <span className="mtt-detail-label">Priorité</span>
                      <span className="mtt-detail-val" style={{display:"flex",alignItems:"center",gap:4}}>
                        <span className={`mtt-task-pri ${t.priority}`} /> {t.priority==="high"?"Haute":t.priority==="medium"?"Moyenne":"Basse"}
                      </span>
                    </div>
                    <div className="mtt-detail-row">
                      <span className="mtt-detail-label">Réponse attendue</span>
                      <span className="mtt-detail-val">{t.responseType==="yesno"?"Oui/Non":t.responseType==="done"?"Fait/Pas fait":t.responseType==="photo"?"Photo":t.responseType==="message"?"Message":"—"}</span>
                    </div>
                    {t.description && (
                      <div style={{marginTop:8,padding:"8px 10px",background:"var(--bgc)",borderRadius:8,fontSize:12,color:"var(--ts)",lineHeight:1.4}}>{t.description}</div>
                    )}
                    {resp && (
                      <div style={{marginTop:8}}>
                        <div style={{fontSize:11,fontWeight:600,color:"var(--ts)",marginBottom:4}}>RÉPONSE REÇUE</div>
                        <div className={`task-response-done ${resp.cls === "oui" || resp.cls === "done" ? "yes" : resp.cls === "non" ? "no" : resp.cls === "photo" ? "photo" : "msg"}`} style={{fontSize:13}}>
                          {resp.text}
                        </div>
                      </div>
                    )}
                    <div style={{fontSize:10,color:"var(--tt)",marginTop:8}}>Créée le {t.createdAt} par {t.createdBy}</div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ))}
    </>
  );
}

function MgrApp({ user, onLogout, tasks, onAddTask }) {
  const [tab, setTab] = useState("dashboard");
  const [showNC, setShowNC] = useState(false);
  const [succ, setSucc] = useState(null);
  const [stab, setStab] = useState("chantier");
  const [cgs, setCgs] = useState(MOCK_DATA.conges);
  const [chs, setChs] = useState(MOCK_DATA.chantiers);
  const [asgn, setAsgn] = useState(MOCK_DATA.planningAssignments);
  const now = useTime();

  const hCg = (id, act) => { setCgs(p => p.map(c => c.id===id?{...c,status:act==="approve"?"Validé":"Refusé"}:c)); setSucc({text:act==="approve"?"Congé validé":"Congé refusé",sub:"Le salarié sera notifié"}); };
  const hAsgn = (date, empIds, chId) => {
    const nw = empIds.map((e,i)=>({id:Date.now()+i,employeeId:e,chantierId:chId,date}));
    setAsgn(p=>[...p,...nw]);
    const ch = chs.find(c=>c.id===chId);
    setSucc({text:"Affectation enregistrée",sub:`${empIds.length} salarié(s) → ${ch?.name}`});
  };
  const hReassign = (date, empId, fromChId, toChId) => {
    setAsgn(p => p.map(a => (a.date===date && a.employeeId===empId && a.chantierId===fromChId) ? {...a, chantierId: toChId} : a));
    const toCh = chs.find(c=>c.id===toChId);
    const emp = MOCK_DATA.employees.find(e=>e.id===empId);
    setSucc({text:"Réaffectation effectuée",sub:`${emp?.name} → ${toCh?.name}`});
  };
  const hRemoveAssign = (date, empId) => {
    setAsgn(p => p.filter(a => !(a.date===date && a.employeeId===empId)));
    const emp = MOCK_DATA.employees.find(e=>e.id===empId);
    setSucc({text:"Affectation retirée",sub:`${emp?.name} est maintenant disponible`});
  };
  const hAddConge = ({employeeId, type, dateStart, dateEnd, reason}) => {
    setCgs(p => [...p, {id:Date.now(), employeeId, type, dateStart, dateEnd, status:"Validé", reason: reason || "Posé par le manager"}]);
    // Also remove assignments for this employee on the congé dates
    const start = dateStart, end = dateEnd;
    setAsgn(p => p.filter(a => !(a.employeeId === employeeId && a.date >= start && a.date <= end)));
    const emp = MOCK_DATA.employees.find(e=>e.id===employeeId);
    setSucc({text:"Congé enregistré",sub:`${emp?.name} — ${type} du ${dateStart} au ${dateEnd}`});
  };
  const hAddTask = (task) => {
    onAddTask(task);
    const emp = MOCK_DATA.employees.find(e=>e.id===task.assigneeId);
    setSucc({text:"Tâche envoyée",sub:`${emp?.name} — ${task.title}`});
  };
  const crCh = (e) => { e.preventDefault(); const fd=new FormData(e.target); setChs(p=>[...p,{id:Date.now(),name:fd.get("name"),address:fd.get("address"),status:"Planifié",teams:[fd.get("team")],lat:45.77,lng:4.85,color:"#8b5cf6"}]); setShowNC(false); setSucc({text:"Chantier créé",sub:fd.get("name")}); };

  const actP = MOCK_DATA.pointages.filter(p=>p.date==="2026-03-26"&&!p.departure);
  const anom = MOCK_DATA.anomalies;
  const pendingTaskCount = tasks.filter(t => t.status !== "completed").length;
  const tabs = [
    {id:"dashboard",label:"Accueil",icon:I.home},
    {id:"calendrier",label:"Planning",icon:I.calendar},
    {id:"temps",label:"Temps",icon:I.barChart},
    {id:"taches",label:"Tâches",icon:I.task,badge:pendingTaskCount>0},
    {id:"chantiers",label:"Chantiers",icon:I.building},
    {id:"reunion",label:"IA",icon:I.sparkle},
  ];

  return (
    <div className="app">
      <Hd user={user} role="manager" onLogout={onLogout} />
      <div className="pg">

        {tab==="dashboard" && <>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:14,color:"var(--ts)"}}>{now.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})}</div>
            <h2 style={{fontSize:22,fontWeight:700,letterSpacing:-.5,marginTop:4}}>Bonjour, {user.name.split(" ")[0]}</h2>
          </div>
          <div className="sr">
            <div className="sb"><div className="sbv" style={{color:"var(--ok)"}}>{actP.length}</div><div className="sbl">En poste</div></div>
            <div className="sb"><div className="sbv" style={{color:"var(--ac)"}}>{chs.filter(c=>c.status==="En cours").length}</div><div className="sbl">Chantiers</div></div>
            <div className="sb"><div className="sbv" style={{color:"var(--da)"}}>{anom.length}</div><div className="sbl">Anomalies</div></div>
          </div>
          <div className="cd">
            <div className="ch"><span className="ct">Présences aujourd'hui</span></div>
            {actP.map(p=>{const emp=MOCK_DATA.employees.find(e=>e.id===p.employeeId);const ch=MOCK_DATA.chantiers.find(c=>c.id===p.chantierId);return(
              <div className="er" key={p.id}><div className="ea" style={{background:ch?.color||"#2563eb"}}>{emp.avatar}</div><div className="ei"><div className="en">{emp.name}</div><div className="erl">{ch?.name}</div></div><div className="et"><div className="etv">{p.arrival}</div><div className="etl">Arrivée</div></div></div>
            );})}
          </div>
          {anom.length>0 && <div className="cd"><div className="ch"><span className="ct">Anomalies du jour</span></div>
            {anom.map(a=>{const emp=MOCK_DATA.employees.find(e=>e.id===a.employeeId);return(<div className={`ai ${a.severity==="warning"?"w":"e"}`} key={a.id}><div className={`aico ${a.severity==="warning"?"w":"e"}`}>{I.alert}</div><div className="ait"><h4>{a.type}</h4><p>{emp.name} — {a.chantier}</p></div></div>);})}
          </div>}
          <div className="cd">
            <div className="ch"><span className="ct">Congés en attente</span><span className="bg bg-w">{cgs.filter(c=>c.status==="En attente").length}</span></div>
            {cgs.filter(c=>c.status==="En attente").map(c=>{const emp=MOCK_DATA.employees.find(e=>e.id===c.employeeId);return(
              <div className="cgi" key={c.id}><div className="cgi-i"><h4>{emp?.name} — {c.type}</h4><p>{c.dateStart} → {c.dateEnd}</p></div><div className="ca"><button className="cab ap" onClick={()=>hCg(c.id,"approve")}>{I.check}</button><button className="cab rj" onClick={()=>hCg(c.id,"reject")}>{I.x}</button></div></div>
            );})}
          </div>
        </>}

        {tab==="calendrier" && <Cal conges={cgs} chantiers={chs} assignments={asgn} onAssign={hAsgn} onCongeAction={hCg} onReassign={hReassign} onRemoveAssign={hRemoveAssign} onAddConge={hAddConge} onAddTask={hAddTask} />}

        {/* ── TASK TRACKER ── */}
        {tab==="taches" && <MgrTaskTracker tasks={tasks} chantiers={chs} />}

        {tab==="temps" && <Timesheet conges={cgs} />}

        {tab==="chantiers" && <ChantierTab chantiers={chs} tasks={tasks} onNew={() => setShowNC(true)} />}

        {tab==="reunion" && <MeetingAssistant chantiers={chs} />}
      </div>
      <BN tabs={tabs} active={tab} onNav={setTab} />
      {showNC && <Mod onClose={()=>setShowNC(false)}>
        <h3 className="mt">Nouveau chantier</h3>
        <form onSubmit={crCh}>
          <div className="fg"><label className="fl">Nom du chantier</label><input type="text" className="fi" name="name" placeholder="Ex: Villa Les Roses" required /></div>

          <div className="fg"><label className="fl">Équipe assignée</label><select className="fs" name="team"><option value="Équipe A">Équipe A</option><option value="Équipe B">Équipe B</option><option value="Équipe C">Équipe C</option></select></div>
          <div className="fg"><label className="fl">Date de début</label><input type="date" className="fi" name="startDate" required /></div>
          <button type="submit" className="bt bt-p">{I.check} Créer le chantier</button>

      </Mod>}
      {succ && <Succ text={succ.text} sub={succ.sub} onDone={()=>setSucc(null)} />}
    </div>
  );
}

  const [tasks, setTasks] = useState([
    { id: 1, assigneeId: 1, chantierId: 1, date: "2026-03-26", title: "Vérifier coffrage escalier B", description: "Contrôler l'alignement du coffrage.", priority: "high", status: "new", createdBy: "Marie Laurent", createdAt: "2026-03-26 08:15", responseType: "photo", deadline: "2026-03-26", response: null },
    { id: 2, assigneeId: 2, chantierId: 1, date: "2026-03-26", title: "Tirer les câbles RJ45 étage 2", description: "Passage câbles réseau.", priority: "medium", status: "accepted", createdBy: "Marie Laurent", createdAt: "2026-03-25 16:00", responseType: "yesno", deadline: "2026-03-27", response: null },
    { id: 3, assigneeId: 1, chantierId: 1, date: "2026-03-25", title: "Réceptionner livraison", description: "Livraison 14h.", priority: "low", status: "completed", createdBy: "Marie Laurent", createdAt: "2026-03-25 07:30", responseType: "done", deadline: "2026-03-25", response: "done" },
    { id: 4, assigneeId: 1, chantierId: 1, date: "2026-03-26", title: "Confirmer dispo grue", description: "Confirmation loueur.", priority: "high", status: "new", createdBy: "Marie Laurent", createdAt: "2026-03-26 09:00", responseType: "yesno", deadline: "2026-03-26", response: null },
    { id: 5, assigneeId: 1, chantierId: 1, date: "2026-03-26", title: "Fissure mur porteur ?", description: "Fissure côté nord.", priority: "medium", status: "new", createdBy: "Marie Laurent", createdAt: "2026-03-26 10:30", responseType: "message", deadline: "2026-03-27", response: null },
  ]);
  const addTask = (task) => setTasks(p => [...p, { ...task, id: Date.now(), status: "new", createdAt: new Date().toLocaleString("fr-FR") }]);
  const updateTask = (id, updates) => setTasks(p => p.map(t => t.id === id ? { ...t, ...updates } : t));
  const login = (r) => { if (r==="employee") { setUser(MOCK_DATA.employees[0]); setRole("employee"); } else { setUser({id:99,name:"Marie Laurent",role:"Manager",avatar:"ML"}); setRole("manager"); } };
  const logout = () => { setRole(null); setUser(null); };

  if (!role) return (
    <div className="app">
      <style>{css}</style>
      <div className="login">
        <div className="l-logo"><svg width="36" height="36" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><circle cx="12" cy="10" r="3"/></svg></div>
        <div className="l-title">ChantierTrack</div>
        <div className="l-sub">Pointage intelligent de chantier</div>
        <div className="l-btns">
          <button className="l-btn" onClick={()=>login("employee")}><div className="l-ico emp">{I.user}</div><div className="l-txt"><span>Accès Salarié</span><span className="l-role">Pointer, planning & congés</span></div></button>
          <button className="l-btn" onClick={()=>login("manager")}><div className="l-ico mgr">{I.users}</div><div className="l-txt"><span>Accès Manager</span><span className="l-role">Calendrier, chantiers & équipes</span></div></button>
        </div>
      </div>
    </div>
  );

  return (<div><style>{css}</style>{role==="employee"?<EmpApp user={user} onLogout={logout} tasks={tasks} onUpdateTask={updateTask} />:<MgrApp user={user} onLogout={logout} tasks={tasks} onAddTask={addTask} />}</div>);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
